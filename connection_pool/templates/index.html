<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Connection Pool Contention Demo</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.2rem; }
    .sub { color: #666; margin-bottom: 1.5rem; }
    .controls { display: flex; gap: 1rem; align-items: end; margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: #444; }
    input { width: 80px; padding: 0.3rem; font-size: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }

    h2 { font-size: 1rem; margin: 1.2rem 0 0.5rem; color: #333; }

    /* Pool slots */
    #pool { display: flex; gap: 0.6rem; }
    .slot {
      flex: 1; padding: 0.8rem; border-radius: 6px; text-align: center;
      border: 2px solid #ccc; background: #fafafa; transition: all 0.2s;
      font-family: monospace;
    }
    .slot.busy { border-color: #d93025; background: #fdecea; }
    .slot.idle { border-color: #34a853; background: #e6f4ea; }
    .slot .slot-id { font-weight: bold; font-size: 0.85rem; color: #555; }
    .slot .status { font-size: 1.05rem; margin: 0.3rem 0; }
    .slot .holder { font-size: 0.8rem; color: #666; min-height: 1em; }

    .stats { background: #f4f4f4; padding: 0.8rem 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }

    /* Timeline bars */
    .bar-row { display: flex; align-items: center; gap: 0.5rem; margin: 4px 0; font-family: monospace; font-size: 0.85rem; }
    .bar-row .label { width: 60px; }
    .bar-track { flex: 1; background: #eee; height: 22px; border-radius: 3px; position: relative; overflow: hidden; }
    .wait { background: #f4b400; height: 100%; position: absolute; left: 0; top: 0; }
    .work { background: #0f9d58; height: 100%; position: absolute; top: 0; }
    .legend { font-size: 0.8rem; color: #555; display: flex; gap: 1rem; margin-top: 0.5rem; }
    .legend span::before { content: ""; display: inline-block; width: 10px; height: 10px; margin-right: 4px; vertical-align: middle; border-radius: 2px; }
    .legend .w1::before { background: #f4b400; }
    .legend .w2::before { background: #0f9d58; }
  </style>
</head>
<body>
  <h1>Connection Pool Contention</h1>
  <div class="sub">Pool size <b>3</b>. Each request runs <code>SELECT pg_sleep(3)</code>.</div>

  <h2>Live pool state</h2>
  <div id="pool"></div>

  <h2>Fire requests</h2>
  <div class="controls">
    <div>
      <label>Concurrent requests</label>
      <input id="n" type="number" value="6" min="1" max="30">
    </div>
    <button id="go">Fire</button>
  </div>

  <div class="stats" id="stats">Ready.</div>
  <div id="bars"></div>
  <div class="legend">
    <span class="w1">waiting for connection</span>
    <span class="w2">holding connection (query)</span>
  </div>

<script>
const $ = (id) => document.getElementById(id);

// --- Live pool renderer: polls /pool every 200ms ---
function renderPool(state) {
  const el = $("pool");
  el.innerHTML = "";
  state.slots.forEach(s => {
    const div = document.createElement("div");
    div.className = "slot " + s.status;
    div.innerHTML = `
      <div class="slot-id">conn #${s.slot}</div>
      <div class="status">${s.status.toUpperCase()}</div>
      <div class="holder">${s.holder ? "held by " + s.holder : "&nbsp;"}</div>
    `;
    el.appendChild(div);
  });
}

async function pollPool() {
  try {
    const r = await fetch("/pool");
    renderPool(await r.json());
  } catch (e) {}
}
setInterval(pollPool, 200);
pollPool();

// --- Fire requests + timeline ---
$("go").onclick = async () => {
  const n = parseInt($("n").value, 10);
  $("bars").innerHTML = "";
  $("stats").textContent = "Running...";

  const t0 = performance.now();
  const rows = [];
  for (let i = 0; i < n; i++) {
    const row = document.createElement("div");
    row.className = "bar-row";
    row.innerHTML = `<span class="label">req ${i+1}</span>
                     <div class="bar-track">
                       <div class="wait"></div>
                       <div class="work"></div>
                     </div>
                     <span class="time" style="width:70px;text-align:right"></span>`;
    $("bars").appendChild(row);
    rows.push(row);
  }

  const promises = rows.map((row, i) => {
    const started = performance.now();
    return fetch("/slow?req=" + (i+1))
      .then(r => r.json())
      .then(data => {
        const finished = performance.now();
        const waited = data.waited_for_conn;
        const total = (finished - started) / 1000;
        return { i, started: (started - t0)/1000, waited, work: total - waited, total };
      });
  });

  const results = await Promise.all(promises);
  const totalWall = (performance.now() - t0) / 1000;
  const scale = 100 / totalWall;

  results.forEach(r => {
    const row = rows[r.i];
    row.querySelector(".wait").style.left = (r.started * scale) + "%";
    row.querySelector(".wait").style.width = (r.waited * scale) + "%";
    row.querySelector(".work").style.left = ((r.started + r.waited) * scale) + "%";
    row.querySelector(".work").style.width = (r.work * scale) + "%";
    row.querySelector(".time").textContent = r.total.toFixed(2) + "s";
  });

  const maxWait = Math.max(...results.map(r => r.waited));
  $("stats").innerHTML =
    `requests: <b>${n}</b> · pool: <b>3</b> · wall time: <b>${totalWall.toFixed(2)}s</b> · max wait: <b>${maxWait.toFixed(2)}s</b>`;
};
</script>
</body>
</html>
